<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Broker Enterprise v11.0 | Senior Developer Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <style>
        :root {
            --glass: rgba(10, 15, 28, 0.94);
            --glass-border: rgba(16, 185, 129, 0.15);
            --emerald: #10b981;
            --indigo: #6366f1;
            --rose: #f43f5e;
            --amber: #f59e0b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #064e3b, #020617 40%, #010409); 
            color: #f8fafc; 
            height: 100vh; 
            overflow: hidden; 
            margin: 0; 
        }

        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(50px) saturate(200%); 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9); 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, var(--emerald), var(--indigo)); 
            border-radius: 10px; 
        }

        .animate-in { animation: slideUp 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .btn-glow { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-glow:hover { 
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); 
            transform: translateY(-2px); 
            filter: brightness(1.1);
        }
        .btn-glow:active { transform: translateY(1px); }

        .status-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 8px var(--emerald)); } 
            50% { opacity: 0.6; filter: drop-shadow(0 0 15px var(--emerald)); } 
        }

        .circle-progress { transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1); stroke-dasharray: 251.2; }

        .tooltip { position: relative; display: inline-block; }
        .tooltip .tooltiptext { 
            visibility: hidden; width: max-content; background-color: #0f172a; color: #fff; 
            text-align: center; border-radius: 8px; padding: 6px 12px; position: absolute; 
            z-index: 100; bottom: 130%; left: 50%; transform: translateX(-50%); opacity: 0; 
            transition: opacity 0.3s; font-size: 11px; font-weight: 700; border: 1px solid #334155; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        .code-block { font-family: 'Fira Code', monospace; font-size: 13px; line-height: 1.6; border-radius: 12px; margin: 10px 0; overflow: hidden; }
        pre[class*="language-"] { margin: 0; border: 1px solid rgba(255,255,255,0.05); }

        .terminal-header { 
            background: #1e293b; padding: 8px 16px; border-radius: 12px 12px 0 0; 
            display: flex; gap: 8px; border: 1px solid rgba(255,255,255,0.05); border-bottom: none;
        }
        .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }

        .glass-sidebar { width: 320px; transition: all 0.4s ease; }
        @media (max-width: 1024px) { .glass-sidebar { width: 80px; } .glass-sidebar span, .glass-sidebar p, .glass-sidebar h1 { display: none; } }
    </style>
</head>
<body>
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useReducer } = React;

        const CONFIG = { STORAGE_KEY: 'aibroker_enterprise_v11' };

        const INITIAL_STATE = {
            messages: [{
                id: 'sys-1',
                type: 'system',
                text: "🚀 ENTERPRISE v11.0 ONLINE. \nSenior Developer Assistant modli to'liq ishga tushirildi. \nYangilanish: To'liq fayl boshqaruvi, o'chirish logikasi va professional kod refaktoringi qo'shildi.",
                time: new Date()
            }],
            input: '', 
            isLoading: false, 
            attachedFile: null, 
            showSettings: false,
            winRate: 88, 
            scoreCard: 94,
            config: { apiKey: '', tgToken: '', tgChatId: '' }
        };

        const reducer = (state, action) => {
            switch (action.type) {
                case 'SET_INPUT': return { ...state, input: action.payload };
                case 'ADD_MESSAGE': return { ...state, messages: [...state.messages, action.payload] };
                case 'DELETE_MESSAGE': return { ...state, messages: state.messages.filter(m => m.id !== action.payload) };
                case 'CLEAR_MESSAGES': return { ...state, messages: [state.messages[0]] };
                case 'SET_LOADING': return { ...state, isLoading: action.payload };
                case 'SET_FILE': return { ...state, attachedFile: action.payload };
                case 'TOGGLE_SETTINGS': return { ...state, showSettings: !state.showSettings };
                case 'UPDATE_CONFIG': return { ...state, config: { ...state.config, ...action.payload } };
                case 'UPDATE_METRICS': return { ...state, winRate: action.payload.winRate, scoreCard: action.payload.scoreCard };
                default: return state;
            }
        };

        const CodeBlock = ({ content, language = 'javascript' }) => {
            useEffect(() => { Prism.highlightAll(); }, [content]);
            return (
                <div className="code-block group relative">
                    <div className="terminal-header">
                        <div className="terminal-dot bg-red-500"></div>
                        <div className="terminal-dot bg-amber-500"></div>
                        <div className="terminal-dot bg-emerald-500"></div>
                        <span className="ml-auto text-[10px] font-bold text-slate-500 uppercase tracking-widest">{language}</span>
                    </div>
                    <pre><code className={`language-${language}`}>{content}</code></pre>
                </div>
            );
        };

        const App = () => {
            const [state, dispatch] = useReducer(reducer, INITIAL_STATE);
            const chatEndRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        dispatch({ type: 'UPDATE_CONFIG', payload: parsed });
                    } catch(e) {}
                }
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                lucide.createIcons();
            }, [state.messages, state.isLoading]);

            const exportPDF = (text) => {
                const element = document.createElement('div');
                element.innerHTML = `
                    <div style="font-family: Arial, sans-serif; padding: 30px; color: #1e293b;">
                        <h2 style="color: #047857; border-bottom: 2px solid #047857; padding-bottom: 10px; margin-bottom: 20px;">AI Broker Pro - Texnik Hisobot</h2>
                        <div style="white-space: pre-wrap; line-height: 1.6; font-size: 14px;">${text}</div>
                        <p style="margin-top: 40px; font-size: 12px; color: #64748b; text-align: right;">Generatsiya qilingan vaqt: ${new Date().toLocaleString()}</p>
                    </div>
                `;
                html2pdf().set({
                    margin: 10,
                    filename: `DevReport_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                }).from(element).save();
            };

            const exportData = (type, text) => {
                let content = '';
                let mimeType = '';
                let extension = '';
                const formattedText = text.replace(/\n/g, '<br>');

                if (type === 'csv') {
                    content = text.split('\n').map(row => `"${row.replace(/"/g, '""')}"`).join('\n');
                    mimeType = 'text/csv;charset=utf-8;';
                    extension = 'csv';
                } else if (type === 'json') {
                    const jsonObject = { documentType: "AI Broker Pro Output", generatedAt: new Date().toISOString(), reportContent: text };
                    content = JSON.stringify(jsonObject, null, 4);
                    mimeType = 'application/json;charset=utf-8;';
                    extension = 'json';
                } else if (type === 'word') {
                    content = `<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>${formattedText}</body></html>`;
                    mimeType = 'application/msword;charset=utf-8;';
                    extension = 'doc';
                }

                if (content) {
                    const blob = new Blob(['\ufeff', content], { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `DevExport_${Date.now()}.${extension}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            };

            const saveToDisk = async (text) => {
                try {
                    if (!window.showSaveFilePicker) {
                        alert("Kechirasiz, brauzeringiz File System API'ni qo'llab-quvvatlamaydi. Boshqa eksport tugmalaridan foydalaning.");
                        return;
                    }
                    
                    let cleanText = text;
                    const t = String.fromCharCode(96);
                    const regexPattern = t + t + t + '(?:[a-zA-Z0-9]+)?\\n([\\s\\S]*?)' + t + t + t;
                    const codeBlockRegex = new RegExp(regexPattern, 'i');
                    const codeMatch = text.match(codeBlockRegex);
                    
                    let suggestedExt = '.js';
                    if(codeMatch && codeMatch[1]) {
                        cleanText = codeMatch[1].trim();
                        const langMatch = text.match(/```(\w+)/);
                        if(langMatch) suggestedExt = '.' + (langMatch[1] === 'python' ? 'py' : langMatch[1]);
                    }

                    const handle = await window.showSaveFilePicker({
                        suggestedName: `CodeUpdate_${Date.now()}${suggestedExt}`,
                        types: [{
                            description: 'Dasturlash va Matn fayllari',
                            accept: { 'text/plain': ['.txt', '.html', '.js', '.py', '.json', '.css', '.md', '.ts', '.tsx'] }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(cleanText);
                    await writable.close();
                    alert("Fayl muvaffaqiyatli saqlandi!");
                } catch (error) {
                    if (error.name !== 'AbortError') alert('Xatolik: ' + error.message);
                }
            };

            const sendToTelegram = async (text) => {
                let { tgToken, tgChatId } = state.config;
                if (!tgToken || !tgChatId) {
                    alert("Telegram konfiguratsiyasi topilmadi. CONFIG bo'limidan sozlang.");
                    return;
                }
                const url = `https://api.telegram.org/bot${tgToken.trim()}/sendMessage`;
                let safeText = text.replace(/<[^>]*>?/gm, '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                if(safeText.length > 3900) safeText = safeText.substring(0, 3900) + '\n\n... [Truncated]';
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: tgChatId.toString().replace(/\s+/g, ''), text: `💻 <b>DEVELOPER LOG:</b>\n\n${safeText}`, parse_mode: 'HTML' })
                    });
                    const data = await response.json();
                    if (data.ok) alert("Telegram'ga jo'natildi!");
                    else throw new Error(data.description);
                } catch (error) { alert(`TELEGRAM XATOSI: ${error.message}`); }
            };

            const callGemini = async (prompt, fileData) => {
                if (!state.config.apiKey) return "CRITICAL ERROR: API Key kiritilmagan.";

                let resolvedModel = "models/gemini-2.5-flash"; // Default fallback
                try {
                    const listResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${state.config.apiKey}`);
                    const listData = await listResponse.json();
                    if (listData.models) {
                        const validModels = listData.models.filter(m => m.supportedGenerationMethods?.includes('generateContent'));
                        const modelNames = validModels.map(m => m.name);
                        if (modelNames.includes('models/gemini-2.5-flash')) resolvedModel = 'models/gemini-2.5-flash';
                        else if (modelNames.includes('models/gemini-2.0-flash')) resolvedModel = 'models/gemini-2.0-flash';
                        else if (modelNames.includes('models/gemini-1.5-pro')) resolvedModel = 'models/gemini-1.5-pro';
                        else if (modelNames.length > 0) resolvedModel = modelNames[0];
                    }
                } catch (discoveryError) {
                    console.warn("Auto-discovery xatosi:", discoveryError);
                }

                const API_URL = `https://generativelanguage.googleapis.com/v1beta/${resolvedModel}:generateContent?key=${state.config.apiKey}`;

                const systemContext = `Sen Senior Full-Stack Dasturchi, Arxitektor va Universal AI-ekspertsan.
Javoblaring dunyo darajasidagi Clean Code, SOLID, DRY prinsiplariga asoslanishi shart.

QAT'IY QOIDALAR:
1. KOD YOZISH: Hech qanday "placeholder" ishlatma. Barcha kodlar to'liq va xatosiz bo'lishi kerak.
2. TAHLIL: Foydalanuvchi so'rovini qat'iy mantiq bilan tahlil qil. Agar xato topsang, darhol tuzatishni taklif qil.
3. FAYL BOSHQARUVI: Agar kodni o'chirish yoki o'zgartirish so'ralsa, eng xavfsiz va samarali usulni ko'rsat.
4. TILING: Muloyim, lekin professional va qat'iy. O'zbek tilida texnik terminlarni to'g'ri ishlata bil.
5. FORMAT: Kod bloklarini doim \`\`\`[language]\`\`\` formatida yoz.

Metrikalarni javob oxirida mana bunga o'xshash formatda qo'sh:
[METRICS]{"winRate": 95, "scoreCard": 98}[/METRICS]`;

                const contents = [];
                const parts = [{ text: systemContext + "\n\nFoydalanuvchi So'rovi: " + prompt }];
                if (fileData) parts.push({ inline_data: { mime_type: fileData.mimeType, data: fileData.base64 } });
                contents.push({ role: 'user', parts });

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, generationConfig: { temperature: 0.2, topP: 0.95 } })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        if (data.error && data.error.message.includes('API key not valid')) {
                            throw new Error("Yaroqsiz API kalit (API Key).");
                        }
                        if (response.status === 429 || (data.error && data.error.message.includes('Quota exceeded'))) {
                            const match = data.error?.message.match(/retry in ([\d\.]+)s/);
                            if (match) {
                                throw new Error(`Bepul API limiti tugadi (1 daqiqada 15ta). Iltimos, yana ${Math.ceil(parseFloat(match[1]))} soniya kuting...`);
                            }
                            throw new Error("Google API bepul limiti tugadi. Iltimos 30 soniyadan so'ng qayta urinib ko'ring.");
                        }
                        throw new Error(data.error?.message || "Model xatosi yuz berdi.");
                    }

                    let aiText = data.candidates[0].content.parts[0].text;
                    const metricsRegex = /\[METRICS\](.*?)\[\/METRICS\]/s;
                    const match = aiText.match(metricsRegex);
                    if (match) {
                        try {
                            const metrics = JSON.parse(match[1]);
                            dispatch({ type: 'UPDATE_METRICS', payload: metrics });
                            aiText = aiText.replace(metricsRegex, '').trim();
                        } catch (e) {}
                    }
                    return aiText;
                } catch (err) { return `XATOLIK: ${err.message}`; }
            };

            const handleSend = async () => {
                if (!state.input.trim() && !state.attachedFile) return;
                const userMsg = { id: Date.now().toString(), type: 'user', text: state.attachedFile ? `[FAYL: ${state.attachedFile.name}]\n${state.input}` : state.input, time: new Date() };
                dispatch({ type: 'ADD_MESSAGE', payload: userMsg });
                const p = state.input || "Faylni tahlil qil.";
                const f = state.attachedFile;
                dispatch({ type: 'SET_INPUT', payload: '' });
                dispatch({ type: 'SET_FILE', payload: null });
                dispatch({ type: 'SET_LOADING', payload: true });
                const res = await callGemini(p, f);
                dispatch({ type: 'ADD_MESSAGE', payload: { id: (Date.now()+1).toString(), type: 'bot', text: res, time: new Date() } });
                dispatch({ type: 'SET_LOADING', payload: false });
            };

            const handleQuickAction = (actionPrompt) => {
                dispatch({ type: 'SET_INPUT', payload: actionPrompt });
                // Bu yerda foydalanuvchi "Send" tugmasini bosishi kerak yoki avtomatik yuborish mumkin
                // User tajribasi uchun inputda qoldiramiz, xohlasa tahrirlaydi.
            };

            const handleFile = (e) => {
                const f = e.target.files[0];
                if (!f) return;
                const r = new FileReader();
                r.onload = () => {
                    dispatch({ type: 'SET_FILE', payload: { name: f.name, mimeType: f.type || 'text/plain', base64: r.result.split(',')[1] } });
                };
                r.readAsDataURL(f);
            };

            const renderFormattedText = (text) => {
                // Oddiy Markdown parser simulate
                const segments = text.split(/(```[\s\S]*?```)/g);
                return segments.map((seg, i) => {
                    if (seg.startsWith('```')) {
                        const match = seg.match(/```(\w+)?\n([\s\S]*?)```/);
                        const lang = match ? match[1] || 'javascript' : 'javascript';
                        const code = match ? match[2] : seg.replace(/```/g, '');
                        return <CodeBlock key={i} content={code} language={lang} />;
                    }
                    return <div key={i} className="whitespace-pre-wrap mb-4">{seg}</div>;
                });
            };

            return (
                <div className="flex h-full p-4 lg:p-6 gap-6 relative overflow-hidden">
                    {state.showSettings && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-2xl p-4 animate-in">
                            <div className="glass-panel p-10 rounded-[3rem] w-full max-w-lg space-y-8">
                                <h2 className="text-3xl font-black text-emerald-400 flex items-center gap-4"><i data-lucide="shield-check"></i> ENTERPRISE CONFIG</h2>
                                <div className="space-y-5">
                                    <div className="group">
                                        <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2 block group-focus-within:text-emerald-400 transition-colors">Gemini API Key (Pro/Flash)</label>
                                        <input type="password" value={state.config.apiKey} onChange={e => dispatch({ type: 'UPDATE_CONFIG', payload: { apiKey: e.target.value } })} className="w-full bg-slate-900/50 border border-slate-700/50 p-5 rounded-2xl outline-none focus:border-emerald-500 text-sm font-mono transition-all" placeholder="Enter key..."/>
                                    </div>
                                    <div className="group">
                                        <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2 block group-focus-within:text-indigo-400 transition-colors">Telegram Bot Token</label>
                                        <input type="password" value={state.config.tgToken} onChange={e => dispatch({ type: 'UPDATE_CONFIG', payload: { tgToken: e.target.value } })} className="w-full bg-slate-900/50 border border-slate-700/50 p-5 rounded-2xl outline-none focus:border-indigo-500 text-sm font-mono transition-all" placeholder="Bot token..."/>
                                    </div>
                                    <div className="group">
                                        <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1 mb-2 block group-focus-within:text-indigo-400 transition-colors">Telegram Chat ID</label>
                                        <input type="text" value={state.config.tgChatId} onChange={e => dispatch({ type: 'UPDATE_CONFIG', payload: { tgChatId: e.target.value } })} className="w-full bg-slate-900/50 border border-slate-700/50 p-5 rounded-2xl outline-none focus:border-indigo-500 text-sm font-mono transition-all" placeholder="Chat ID..."/>
                                    </div>
                                </div>
                                <button onClick={() => { localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(state.config)); dispatch({ type: 'TOGGLE_SETTINGS' }); }} className="w-full bg-emerald-600 hover:bg-emerald-500 p-6 rounded-2xl font-black uppercase tracking-widest shadow-2xl transition-all btn-glow">SAVE PROTOCOL</button>
                            </div>
                        </div>
                    )}

                    <aside className="glass-sidebar glass-panel rounded-[2.5rem] p-8 flex flex-col gap-8 no-print shrink-0 overflow-hidden">
                        <div className="flex items-center gap-5">
                            <div className="w-16 h-16 bg-emerald-600 rounded-3xl flex items-center justify-center status-pulse shadow-2xl shadow-emerald-500/20"><i data-lucide="cpu" className="text-white w-8 h-8"></i></div>
                            <div>
                                <h1 className="font-black text-2xl tracking-tighter leading-none">AI DEV</h1>
                                <span className="text-emerald-500 text-[10px] uppercase font-bold tracking-[0.3em]">Broker v11.0</span>
                            </div>
                        </div>

                        <div className="flex-1 space-y-10 overflow-y-auto custom-scrollbar pr-2">
                            <div className="bg-slate-900/40 p-8 rounded-[2.5rem] border border-slate-800/50 flex flex-col items-center relative overflow-hidden backdrop-blur-md">
                                <p className="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-6">Efficiency Engine</p>
                                <div className="relative w-40 h-40 flex items-center justify-center">
                                    <svg className="w-full h-full transform -rotate-90 drop-shadow-2xl">
                                        <circle cx="80" cy="80" r="70" stroke="rgba(15, 23, 42, 0.4)" strokeWidth="12" fill="transparent" />
                                        <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-emerald-500 circle-progress" style={{ strokeDashoffset: 439.8 - (439.8 * state.winRate) / 100, strokeDasharray: 439.8 }} />
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="text-4xl font-black text-white">{state.winRate}%</span>
                                        <span className="text-[10px] font-bold text-emerald-400/60 mt-1 uppercase">Accuracy</span>
                                    </div>
                                </div>
                            </div>

                            <nav className="space-y-4">
                                <p className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] ml-2 mb-4">Quick Tools</p>
                                <button onClick={() => handleQuickAction("Ushbu kodni Clean Code prinsiplari asosida refaktoring qilib ber.")} className="w-full p-5 bg-slate-900/50 hover:bg-emerald-600/10 border border-slate-800 rounded-2xl flex items-center gap-4 transition-all group">
                                    <div className="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-white transition-all"><i data-lucide="refresh-cw" className="w-5 h-5"></i></div>
                                    <span className="text-[11px] font-bold uppercase tracking-wider text-slate-400 group-hover:text-emerald-400">Refactoring</span>
                                </button>
                                <button onClick={() => handleQuickAction("Ushbu funktsiya uchun unit-testlar yozib ber (Pytest yoki Jest).")} className="w-full p-5 bg-slate-900/50 hover:bg-indigo-600/10 border border-slate-800 rounded-2xl flex items-center gap-4 transition-all group">
                                    <div className="w-10 h-10 rounded-xl bg-indigo-500/10 flex items-center justify-center group-hover:bg-indigo-500 group-hover:text-white transition-all"><i data-lucide="test-tube-2" className="w-5 h-5"></i></div>
                                    <span className="text-[11px] font-bold uppercase tracking-wider text-slate-400 group-hover:text-indigo-400">Unit Tests</span>
                                </button>
                                <button onClick={() => handleQuickAction("Koddagi ehtimoliy xatolarni va xavfsizlik zaifliklarini top.")} className="w-full p-5 bg-slate-900/50 hover:bg-rose-600/10 border border-slate-800 rounded-2xl flex items-center gap-4 transition-all group">
                                    <div className="w-10 h-10 rounded-xl bg-rose-500/10 flex items-center justify-center group-hover:bg-rose-500 group-hover:text-white transition-all"><i data-lucide="bug" className="w-5 h-5"></i></div>
                                    <span className="text-[11px] font-bold uppercase tracking-wider text-slate-400 group-hover:text-rose-400">Debug & Security</span>
                                </button>
                                <button onClick={() => handleQuickAction("Loyihani Docker-faylini yozish va deploy rejasini tuzish.")} className="w-full p-5 bg-slate-900/50 hover:bg-amber-600/10 border border-slate-800 rounded-2xl flex items-center gap-4 transition-all group">
                                    <div className="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center group-hover:bg-amber-500 group-hover:text-white transition-all"><i data-lucide="container" className="w-5 h-5"></i></div>
                                    <span className="text-[11px] font-bold uppercase tracking-wider text-slate-400 group-hover:text-amber-400">Docker & Deploy</span>
                                </button>
                            </nav>
                        </div>

                        <div className="pt-4 border-t border-slate-800 flex flex-col gap-3">
                            <button onClick={() => dispatch({ type: 'TOGGLE_SETTINGS' })} className="p-5 bg-slate-900 hover:bg-emerald-600 rounded-2xl font-black text-[11px] uppercase transition-all flex items-center justify-center gap-3 text-slate-400 hover:text-white"><i data-lucide="settings" className="w-4 h-4"></i> CONFIGURATION</button>
                            <button onClick={() => { if(confirm("Barcha xat-xabarlarni o'chirishni istaysizmi?")) dispatch({ type: 'CLEAR_MESSAGES' }); }} className="p-5 bg-slate-900/50 hover:bg-rose-600 rounded-2xl font-black text-[11px] uppercase transition-all flex items-center justify-center gap-3 text-rose-500 hover:text-white border border-rose-500/20"><i data-lucide="trash-2" className="w-4 h-4"></i> CLEAR HISTORY</button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col gap-6 h-full min-w-0">
                        <header className="glass-panel h-20 rounded-[2.5rem] flex items-center justify-between px-10 shadow-lg">
                            <div className="flex items-center gap-5">
                                <div className="w-4 h-4 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_15px_#10b981]"></div>
                                <h2 className="font-black text-xl tracking-tight uppercase">Development Terminal</h2>
                            </div>
                            <div className="flex gap-4 items-center">
                                <div className="p-3 bg-slate-900/80 rounded-2xl text-[10px] font-black text-emerald-500 border border-slate-800 tracking-widest flex items-center gap-2 shadow-inner">
                                    <i data-lucide="zap" className="w-3 h-3"></i> AI ENGINE v2.0
                                </div>
                                <div className="p-3 bg-slate-900/80 rounded-2xl text-[10px] font-black text-indigo-400 border border-slate-800 tracking-widest flex items-center gap-2">
                                    <i data-lucide="globe" className="w-3 h-3"></i> LIVE SYNC
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 glass-panel rounded-[3.5rem] p-10 overflow-y-auto custom-scrollbar space-y-10 relative">
                            {state.messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.type === 'user' ? 'justify-end' : 'justify-start'} animate-in`}>
                                    <div className={`max-w-[90%] p-8 rounded-[2.5rem] shadow-2xl relative group ${msg.type === 'user' ? 'bg-indigo-600 rounded-tr-none' : 'bg-[#0f172a] border border-slate-800 rounded-tl-none'}`}>
                                        <div className="flex justify-between items-center mb-6 opacity-40 text-[10px] font-black uppercase tracking-widest">
                                            <span className="flex items-center gap-2"><i data-lucide={msg.type === 'user' ? 'user' : 'bot'} className="w-3 h-3"></i> {msg.type === 'bot' ? 'Senior AI Developer' : 'User Session'}</span>
                                            <span>{msg.time.toLocaleTimeString()}</span>
                                        </div>
                                        <div className="text-[16px] font-medium leading-[1.8] text-slate-200">
                                            {msg.type === 'bot' ? renderFormattedText(msg.text) : msg.text}
                                        </div>

                                        <div className="mt-8 pt-6 border-t border-slate-800/50 flex flex-wrap gap-3 justify-end opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-2 group-hover:translate-y-0">
                                            {msg.type === 'bot' && (
                                                <>
                                                    <div className="tooltip"><button onClick={() => saveToDisk(msg.text)} className="p-3 bg-slate-800/50 hover:bg-emerald-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="hard-drive" className="w-4 h-4"></i></button><span className="tooltiptext">Saqlash / Tahrirlash</span></div>
                                                    <div className="tooltip"><button onClick={() => exportPDF(msg.text)} className="p-3 bg-slate-800/50 hover:bg-rose-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="file-text" className="w-4 h-4"></i></button><span className="tooltiptext">PDF Export</span></div>
                                                    <div className="tooltip"><button onClick={() => exportData('word', msg.text)} className="p-3 bg-slate-800/50 hover:bg-blue-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="file" className="w-4 h-4"></i></button><span className="tooltiptext">Word Doc</span></div>
                                                    <div className="tooltip"><button onClick={() => exportData('json', msg.text)} className="p-3 bg-slate-800/50 hover:bg-orange-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="code" className="w-4 h-4"></i></button><span className="tooltiptext">JSON Format</span></div>
                                                    <div className="tooltip"><button onClick={() => sendToTelegram(msg.text)} className="p-3 bg-slate-800/50 hover:bg-sky-500 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="send" className="w-4 h-4"></i></button><span className="tooltiptext">Telegramga Log</span></div>
                                                </>
                                            )}
                                            <div className="tooltip"><button onClick={() => dispatch({ type: 'DELETE_MESSAGE', payload: msg.id })} className="p-3 bg-slate-800/50 hover:bg-rose-600 rounded-xl text-slate-400 hover:text-white transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button><span className="tooltiptext">O'chirish</span></div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {state.isLoading && (
                                <div className="flex gap-3 p-8 bg-emerald-500/5 w-fit rounded-[2.5rem] border border-emerald-500/20 shadow-inner">
                                    <div className="w-3 h-3 bg-emerald-500 rounded-full animate-bounce"></div>
                                    <div className="w-3 h-3 bg-emerald-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                                    <div className="w-3 h-3 bg-emerald-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                                    <span className="ml-2 text-xs font-black text-emerald-500/60 uppercase tracking-widest">Processing Intelligence...</span>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        <footer className="flex flex-col gap-4">
                            {state.attachedFile && (
                                <div className="mx-10 p-5 bg-emerald-500/10 border border-emerald-500/30 rounded-3xl flex justify-between items-center text-xs font-black text-emerald-400 animate-in shadow-lg">
                                    <span className="flex items-center gap-4"><i data-lucide="file-code" className="w-5 h-5"></i> READY FOR ANALYSIS: {state.attachedFile.name.toUpperCase()} ({Math.round(state.attachedFile.base64.length * 0.75 / 1024)} KB)</span>
                                    <button onClick={() => dispatch({ type: 'SET_FILE', payload: null })} className="hover:text-rose-500 transition-all transform hover:scale-110"><i data-lucide="x-circle" className="w-6 h-6"></i></button>
                                </div>
                            )}
                            
                            <div className="glass-panel min-h-[7rem] rounded-[3rem] p-5 flex gap-5 items-center px-10 border-t border-slate-800/50 shadow-2xl relative">
                                <button onClick={() => fileInputRef.current.click()} className="p-5 bg-slate-800/50 rounded-2xl hover:bg-emerald-600 transition-all text-slate-400 hover:text-white shadow-inner group">
                                    <i data-lucide="paperclip" className="w-6 h-6 group-hover:rotate-12 transition-transform"></i>
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleFile} className="hidden" />
                                
                                <textarea 
                                    value={state.input} 
                                    onChange={e => dispatch({ type: 'SET_INPUT', payload: e.target.value })} 
                                    onKeyPress={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())} 
                                    className="flex-1 bg-transparent border-none focus:outline-none text-xl font-bold placeholder-slate-700 resize-none py-3 custom-scrollbar" 
                                    placeholder="Kodni tahrirlash yoki yangi loyiha uchun buyruq bering..." 
                                />
                                
                                <button 
                                    onClick={handleSend} 
                                    disabled={state.isLoading || (!state.input.trim() && !state.attachedFile)} 
                                    className="h-20 px-12 bg-emerald-600 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] btn-glow disabled:opacity-20 disabled:grayscale transition-all flex items-center gap-4 shadow-xl"
                                >
                                    <span>EXECUTE</span> <i data-lucide="zap" className="w-4 h-4"></i>
                                </button>
                            </div>
                            <div className="text-center pb-2">
                                <span className="text-[10px] font-bold text-slate-700 uppercase tracking-[0.5em]">Quantum Architecture System v11.0.4 — Enterprise Edition</span>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
