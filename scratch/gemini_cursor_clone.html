<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Clone - Enterprise Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-base: #1e1e1e;
            --bg-sidebar: #181818;
            --bg-panel: #252526;
            --bg-hover: #2a2d2e;
            --border-color: #333333;
            --text-main: #cccccc;
            --text-muted: #858585;
            --accent: #007acc;
            --ai-accent: #10b981;
        }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #424242; border: 2px solid var(--bg-base); border-radius: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }
        .chat-markdown pre { background: #0d1117; padding: 12px; border-radius: 8px; overflow-x: auto; border: 1px solid #30363d; margin: 10px 0; }
        .chat-markdown code { font-family: 'Consolas', monospace; font-size: 13px; }
        .pulse-anim { animation: pulseIcon 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulseIcon { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #10b981; } 50% { opacity: 0.5; text-shadow: none; } }
        /* Dropdown menus */
        .dropdown { position: absolute; top: 100%; left: 0; background: var(--bg-panel); border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.5); z-index: 50; border-radius: 4px; padding: 4px 0; min-width: 200px; }
        .dropdown-item { padding: 6px 16px; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); }
        .dropdown-item:hover { background: var(--bg-hover); color: white; }
        .dropdown-shortcut { color: var(--text-muted); font-size: 11px; }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        let globalEditorInstance = null;

        const CodeEditor = ({ content, language = 'javascript', onChange }) => {
            const editorRef = useRef(null);
            const monacoRef = useRef(null);

            useEffect(() => {
                if (!window.require) return;
                window.require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
                window.require(['vs/editor/editor.main'], function(monaco) {
                    monacoRef.current = monaco.editor.create(editorRef.current, {
                        value: content,
                        language: language,
                        theme: 'vs-dark',
                        minimap: { enabled: false },
                        automaticLayout: true,
                        fontSize: 14,
                        fontFamily: 'Consolas, "Courier New", monospace',
                        scrollBeyondLastLine: false,
                        wordWrap: "on"
                    });
                    
                    globalEditorInstance = monacoRef.current;
                    monacoRef.current.onDidChangeModelContent(() => {
                        onChange(monacoRef.current.getValue());
                    });
                });
                return () => { if (monacoRef.current) monacoRef.current.dispose(); globalEditorInstance = null; };
            }, []);

            useEffect(() => {
                if (monacoRef.current && content !== monacoRef.current.getValue()) {
                    const position = monacoRef.current.getPosition();
                    monacoRef.current.setValue(content);
                    if (position) monacoRef.current.setPosition(position);
                }
                if (monacoRef.current && window.monaco && window.monaco.editor) {
                    window.monaco.editor.setModelLanguage(monacoRef.current.getModel(), language);
                }
            }, [content, language]);

            return <div ref={editorRef} className="w-full h-full"></div>;
        };

        const App = () => {
            // Configuration & State
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_cursor_key') || '');
            const [showSettings, setShowSettings] = useState(!localStorage.getItem('gemini_cursor_key'));
            const [showInstructions, setShowInstructions] = useState(false);
            const [selectedModel, setSelectedModel] = useState(localStorage.getItem('gemini_selected_model') || 'models/gemini-2.5-flash');
            
            // FS State
            const [workspaceHandle, setWorkspaceHandle] = useState(null);
            const [files, setFiles] = useState([]);
            const [activeFileHandle, setActiveFileHandle] = useState(null);
            const [activeFileName, setActiveFileName] = useState("Salom_Dunyo.js");
            const [activeContent, setActiveContent] = useState("// Cursor Enterprise Kloniga Xush Kelibsiz!\n// Barcha knopkalar ishlaydi. \n// 'Terminal' panelida diagnostikani tekshirishingiz mumkin.\n\nconsole.log('AI is perfectly working!');");
            const [isUnsaved, setIsUnsaved] = useState(false);

            // UI State
            const [chatOpen, setChatOpen] = useState(true);
            const [terminalOpen, setTerminalOpen] = useState(true);
            const [activeMenu, setActiveMenu] = useState(null);

            // Super Chat System State (Sessions & History)
            const [chatSessions, setChatSessions] = useState(() => {
                try {
                    const saved = localStorage.getItem('gemini_cursor_chat_sessions');
                    if (saved) return JSON.parse(saved);
                } catch(e) {}
                const initialSess = { 
                    id: Date.now(), 
                    title: "Boshlang'ich suhbat", 
                    messages: [{ id: 1, role: 'ai', text: "Salom! Multichat va o'chirish funksiyasi ishga tushirildi! Siz endi eskisini yo'qotmasdan yangi chat ochishingiz, kerakmas savollarni bittalab o'chirishingiz yoki butun suhbatni o'chirishingiz mumkin!" }] 
                };
                return [initialSess];
            });
            const [activeSessionId, setActiveSessionId] = useState(() => {
                const arr = JSON.parse(localStorage.getItem('gemini_cursor_chat_sessions') || '[]');
                return arr.length > 0 ? arr[0].id : null;
            });
            const [showChatHistory, setShowChatHistory] = useState(false);

            const activeSession = chatSessions.find(s => s.id === activeSessionId) || chatSessions[0];
            const messages = activeSession ? activeSession.messages : [];

            // Derived updater for messages
            const updateSessionMessages = (newMsgs, titleHint = null) => {
                setChatSessions(prev => prev.map(s => {
                    if (s.id === activeSessionId) {
                        let newTitle = s.title;
                        if (titleHint) newTitle = titleHint;
                        return { ...s, messages: newMsgs, title: newTitle };
                    }
                    return s;
                }));
            };

            const [inputValue, setInputValue] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [terminalLogs, setTerminalLogs] = useState([{ time: new Date().toLocaleTimeString(), text: "▶ Oyna tayyor. (Cursor Emulator v2.0).", type: "system" }]);

            const chatEndRef = useRef(null);
            const terminalEndRef = useRef(null);

            useEffect(() => {
                setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
            }, [files, messages, chatOpen, showSettings, showInstructions, terminalOpen, activeMenu, showChatHistory, chatSessions]);

            useEffect(() => { if (!showChatHistory) chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, showChatHistory]);
            useEffect(() => { terminalEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [terminalLogs, terminalOpen]);

            // Save multiple sessions to localStorage automatically
            useEffect(() => {
                localStorage.setItem('gemini_cursor_chat_sessions', JSON.stringify(chatSessions));
            }, [chatSessions]);

            // Click outside to close menus
            useEffect(() => {
                const handleClickOutside = () => setActiveMenu(null);
                document.addEventListener('click', handleClickOutside);
                return () => document.removeEventListener('click', handleClickOutside);
            }, []);

            const addLog = (text, type = 'info') => {
                setTerminalLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), text, type }]);
            };

            const toggleMenu = (e, menuName) => {
                e.stopPropagation();
                setActiveMenu(activeMenu === menuName ? null : menuName);
            };

            // --- Menu Actions ---
            // Hidden input reference for fallback folder picking
            const folderInputRef = useRef(null);

            const handleFallbackFolderSelect = async (e) => {
                const selectedFiles = Array.from(e.target.files);
                if (selectedFiles.length === 0) return;
                
                setWorkspaceHandle({ name: "Lokal Papka" });
                
                const fakeHandles = [];
                for (const f of selectedFiles) {
                    const relative = f.webkitRelativePath || "";
                    if (relative.includes('node_modules/') || relative.includes('.git/') || relative.includes('.venv/') || relative.includes('.idea/') || relative.includes('__pycache__/')) continue;

                    // Faqat oxirgi fayl nomini olish yoki to'liq yo'lini ko'rsatish
                    const displayname = relative.length > 0 ? relative.split('/').slice(-2).join('/') : f.name;

                    fakeHandles.push({
                        name: displayname,
                        kind: 'file',
                        getFile: async () => f,
                        isFallback: true
                    });
                }

                fakeHandles.sort((a, b) => a.name.localeCompare(b.name));
                
                // Limit for performance
                let finalFiles = fakeHandles;
                if (fakeHandles.length > 300) {
                    addLog(`Ogohlantirish: ${fakeHandles.length} ta fayl topildi. Brauzer qotib qolmasligi uchun faqata dastlabki 300 tasi chap panelda ko'rsatildi! (.venv va h.k lar hisobga olinmadi)`, 'warn');
                    finalFiles = fakeHandles.slice(0, 300);
                } else {
                    addLog(`Papka ulandi: jami ${finalFiles.length} ta aktiv fayl yuklandi.`, 'success');
                }
                setFiles(finalFiles);
            };

            const handleOpenFolder = async () => {
                if (!window.showDirectoryPicker) {
                    addLog("Brauzerda to'g'ridan to'g'ri fayl tizimi himoyalangan ('file://' muhiti). Eski Standart papka mexanizmi (Fallback) ochilmoqda...", 'warn');
                    if (folderInputRef.current) folderInputRef.current.click();
                    return;
                }
                
                try {
                    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setWorkspaceHandle(dirHandle);
                    const fileEntries = [];
                    for await (const entry of dirHandle.values()) {
                        if (entry.kind === 'file') fileEntries.push(entry);
                    }
                    fileEntries.sort((a, b) => a.name.localeCompare(b.name));
                    setFiles(fileEntries);
                    addLog(`Papka ulandi: ${dirHandle.name}`, 'info');
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        addLog(`Zamonaviy File API ruxsat bermadi: ${e.message}. (Papka o'qilganda ichida .venv yo node_modules bo'lsa qotishi mumkin, Standart usulga o'tilmoqda...)`, 'error');
                        if (folderInputRef.current) folderInputRef.current.click();
                    }
                }
            };

            const handleOpenFile = async (fileHandle) => {
                try {
                    addLog(`Fayl o'qilmoqda: ${fileHandle.name}...`, 'system');
                    const file = await fileHandle.getFile();
                    
                    let text = "Bo'sh yoki o'qish xatosi...";
                    if (file.text) {
                        text = await file.text();
                    } else {
                        text = await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = e => resolve(e.target.result);
                            reader.onerror = e => reject(new Error("FileReader xatosi"));
                            reader.readAsText(file);
                        });
                    }

                    // Protect against binaries
                    if (text.includes('\\x00') || file.size > 2000000) {
                        addLog(`Fayl binar turdagi yoki juda xajmi katta. Uni Editorga joylab bo'lmasligi mumkin. O'qish rad etildi.`, 'warn');
                        return;
                    }

                    setActiveFileHandle(fileHandle);
                    setActiveFileName(fileHandle.name);
                    setActiveContent(text);
                    setIsUnsaved(false);
                    addLog(`✅ Kod oynaga muvaffaqiyatli tortib kelindi: ${fileHandle.name}`, 'success');
                } catch (e) { 
                    addLog(`Faylni ochish/o'qish rostdan ham imkonsiz. Sabab: ${e.message}`, 'error'); 
                    console.error("FAIL", e);
                }
            };

            const handleCreateFile = async () => {
                if (!workspaceHandle) {
                    return alert("Avval papka ochishingiz kerak ('File' -> 'Open Folder').");
                }
                const name = prompt("Yangi fayl nomini kiriting (masalan, script.js yoki index.html):", "yangi.html");
                if (!name) return;
                try {
                    // Fallback create mock
                    if (workspaceHandle.isFallback || !workspaceHandle.getFileHandle) {
                         const f = new File([`<!-- ${name} -->\n<h1>Yangi fayl</h1>`], name, { type: "text/plain" });
                         setFiles(prev => [...prev, { name: name, kind: 'file', getFile: async()=>f, isFallback: true }].sort((a,b)=>a.name.localeCompare(b.name)));
                         addLog(`Zaxira fayl (Faqat xotirada) yaratildi: ${name}`, 'success');
                         return;
                    }

                    const newHandle = await workspaceHandle.getFileHandle(name, { create: true });
                    const writable = await newHandle.createWritable();
                    await writable.write(`<!-- ${name} yaratildi... -->\n`);
                    await writable.close();
                    setFiles(prev => [...prev, newHandle].sort((a, b) => a.name.localeCompare(b.name)));
                    handleOpenFile(newHandle);
                    addLog(`Fayl yaratildi: ${name}`, 'success');
                } catch (e) { addLog(`Fayl yasashda xato: ${e.message}`, 'error'); }
            };

            const handleRunCode = () => {
                if (!activeFileName.toLowerCase().endsWith('.html') && !activeFileName.toLowerCase().endsWith('.htm')) {
                    addLog("Faqat .html fayllarni to'g'ridan to'g'ri Brouzerda visual yurgizish mumkin!", "warn");
                    return;
                }
                try {
                    const win = window.open('', '_blank');
                    win.document.write(activeContent);
                    win.document.close();
                    addLog(`🚀 Dastur muvaffaqiyatli 'Run' qilindi (Yangi oynada).`, 'success');
                } catch (e) {
                    addLog(`'Run' qilish imkonsiz, popup bloklangan bo'lishi mumkin: ${e.message}`, 'error');
                }
            };

            const handleSaveFile = async () => {
                if (!activeFileHandle) return alert("Iltimos, avval fayl oching.");
                if (activeFileHandle.isFallback) {
                    // Fallback save logic -> Force download
                    const blob = new Blob([activeContent], { type: "text/plain" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = activeFileHandle.name || 'fayl.txt';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    setIsUnsaved(false);
                    addLog(`✅ Zaxira usulida saqlandi (Download qilindi): ${activeFileName}`, 'success');
                    return;
                }

                try {
                    const writable = await activeFileHandle.createWritable();
                    await writable.write(activeContent);
                    await writable.close();
                    setIsUnsaved(false);
                    addLog(`✅ Saqlandi: ${activeFileName}`, 'success');
                } catch (e) { addLog(`Saqlashda xato: ${e.message}`, 'error'); }
            };

            const handleFormatDocument = () => {
                if (globalEditorInstance) {
                    globalEditorInstance.getAction('editor.action.formatDocument').run();
                    addLog("Kodni tekislaw ishga tushdi", "info");
                }
            };
            const clearTerminal = () => setTerminalLogs([{ time: new Date().toLocaleTimeString(), text: "▶ Terminal toza.", type: "system" }]);
            const checkApiLimits = async () => {
                addLog(`DIAGNOSTIKA: API ulash tekshirilmoqda (${selectedModel})...`, "system");
                setTerminalOpen(true);
                if (!apiKey) return addLog("Xatolik: API kalit kiritilmagan", "error");
                try {
                    const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const listData = await listRes.json();
                    if (!listRes.ok) throw new Error(listData.error?.message || "Ulanish xatosi");
                    const okModels = listData.models.filter(m => m.supportedGenerationMethods?.includes('generateContent')).length;
                    addLog(`✅ MUVAFFAQIYATLI! Jami ${okModels} ta API model ishlayapti.`, "success");
                } catch (err) {
                    addLog(`❌ BOG'LANISHDA XATO: ${err.message}`, "error");
                }
            };

            // Keyboard Bindings
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'F1') { e.preventDefault(); setShowInstructions(true); }
                    if ((e.ctrlKey || e.metaKey)) {
                        if (e.key === 's') { e.preventDefault(); handleSaveFile(); }
                        if (e.key === 'o') { e.preventDefault(); handleOpenFolder(); }
                        if (e.key === 'l') { e.preventDefault(); setChatOpen(prev => !prev); }
                        if (e.key === 'j' || e.key === '`') { e.preventDefault(); setTerminalOpen(prev => !prev); } // Terminal Ctrl+J
                    }
                    if (e.altKey && e.shiftKey && (e.key === 'f' || e.key === 'F')) {
                        e.preventDefault(); handleFormatDocument();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [activeContent, activeFileHandle]);

            // --- AI Chat Logic ---
            const determineLanguage = (filename) => {
                if (!filename || typeof filename !== 'string') return 'javascript';
                filename = filename.toLowerCase();
                if (filename.endsWith('.js') || filename.endsWith('.jsx')) return 'javascript';
                if (filename.endsWith('.ts') || filename.endsWith('.tsx')) return 'typescript';
                if (filename.endsWith('.py')) return 'python';
                if (filename.endsWith('.html') || filename.endsWith('.htm')) return 'html';
                if (filename.endsWith('.css')) return 'css';
                if (filename.endsWith('.json')) return 'json';
                return 'plaintext';
            };

            const switchModel = (model) => {
                setSelectedModel(model);
                localStorage.setItem('gemini_selected_model', model);
                addLog(`⚙️ Dvigatel (Model) o'zgardi -> ${model.replace('models/', '')}`, 'system');
            };

            // CHAT SESSIONS / DELETE ACTIONS
            const handleNewChat = () => {
                const newSess = {
                    id: Date.now(),
                    title: "Yangi suhbat",
                    messages: [{ id: 1, role: 'ai', text: "Yangi varaq! Sizni qanday muammo qiynayapti?" }]
                };
                setChatSessions([newSess, ...chatSessions]);
                setActiveSessionId(newSess.id);
                setShowChatHistory(false);
            };

            const handleDeleteSession = (e, sessionId) => {
                e.stopPropagation();
                const filtered = chatSessions.filter(s => s.id !== sessionId);
                if (filtered.length === 0) {
                    const fallback = { id: Date.now(), title: "Boshlang'ich suhbat", messages: [{ id:1, role: 'ai', text: "Barcha xotira tozalandi." }] };
                    setChatSessions([fallback]);
                    setActiveSessionId(fallback.id);
                } else {
                    setChatSessions(filtered);
                    if (activeSessionId === sessionId) setActiveSessionId(filtered[0].id);
                }
            };

            const handleDeleteMessage = (msgId) => {
                updateSessionMessages(messages.filter(m => m.id !== msgId));
            };

            const sendChat = async () => {
                if (!inputValue.trim() || !apiKey) {
                    if (!apiKey) setShowSettings(true);
                    return;
                }
                const userText = inputValue;
                setInputValue('');
                const newMessages = [...messages, { id: Date.now(), role: 'user', text: userText }];
                
                let titleUpdate = null;
                if (messages.length === 1) { // First user message
                    titleUpdate = userText.substring(0, 25) + (userText.length>25?"...":"");
                }
                updateSessionMessages(newMessages, titleUpdate);
                setIsGenerating(true);

                try {
                    const API_URL = `https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`;
                    // Orqa fonda AI uchun suhbat tarixini yozma ravishda yig'ish
                    const historyDump = messages
                        .filter(m => m.role !== 'error' && m.id !== 1)
                        .map(m => (m.role === 'user' ? "Sizni Savolingiz:" : "Seni Javobing (AI):") + " " + m.text)
                        .join("\n\n---\n\n");

                    const systemContext = `Sen Cursor IDE ning (VS Code kloni) O'zbek tilidagi AI Sherigisan! Dasturchiga eng kuchli yordamchi bo'l.

QAT'IY BUYRUQ: Sen suhbat tarixlarini eslab qola olasan! Quyida mijoz senga shu kungacha nima haqida gaplashganini eslatib (tarix sifatida) yubormoqda. Bularni albatta hisobga ol va esla. "Men eslolmayman" deb aslo aytma.

ENG MUHIM QOIDA: HECH QACHON HTML teglarini (masalan <body>, <head>, <script>), CSS uslublarni yoki JavaScript kodlarni o'zbek tiliga tarjima qilib yuborma! Koddagi <tana>, <bosh>, <skript>, <havola>, <uslub> kabi atamalar qat'iyan man etiladi. Kod o'zgarishsiz o'zining original (inglizcha) sintaksisida qolishi SHART. Faqatgina gaplaringni va suhbatni o'zbek tilida olib bor!

OLDINGI SUHBATLAR TARIXI:
"""
${historyDump || "Suhbat endi boshlanmoqda..."}
"""

HOZIRGI KONTEKST (Ochiq Fayl - Nomi: "${activeFileName}"):
\`\`\`${determineLanguage(activeFileName)}\n${activeContent}\n\`\`\``;

                    const reqBody = {
                        systemInstruction: { role: 'user', parts: [{ text: systemContext }] },
                        contents: [{ role: 'user', parts: [{ text: userText }] }],
                        generationConfig: { temperature: 0.2 }
                    };

                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reqBody)
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        if (response.status === 429 || (data.error && data.error.message.includes('Quota exceeded'))) {
                            throw new Error("Tarmoq Qutisi (Rate Limit) to'lib qoldi. 30 soniya kuting yoki modelni almashtiring.");
                        }
                        if (data.error?.message.includes('API key not valid')) throw new Error("Yaroqsiz API kalit (Kalitingizni Settingsdan tekshiring).");
                        throw new Error(data.error?.message || "Noma'lum server xatosi");
                    }

                    const aiText = data.candidates[0].content.parts[0].text;
                    updateSessionMessages([...newMessages, { id: Date.now()+1, role: 'ai', text: aiText }]);
                } catch (err) {
                    updateSessionMessages([...newMessages, { id: Date.now()+1, role: 'error', text: "❌ XATOLIK: " + err.message }]);
                } finally {
                    setIsGenerating(false);
                }
            };

            const replaceEditorCode = (code) => {
                setActiveContent(code);
                setIsUnsaved(true);
                addLog(`📥 KOD FAYLGA JOYLASHDI. (Saqlashni unutmang)`, 'success');
            };

            const renderMessage = (msg) => {
                if (msg.role === 'error') return <div className="text-red-400 p-3 bg-red-900/20 rounded-lg">{msg.text}</div>;
                if (msg.role === 'user') return <div className="text-gray-100">{msg.text}</div>;

                const segments = msg.text.split(/(```[\s\S]*?```)/g);
                return segments.map((seg, idx) => {
                    if (seg.startsWith('```')) {
                        const match = seg.match(/```(\w+)?\n([\s\S]*?)```/);
                        const code = match ? match[2] : seg.replace(/```/g, '');
                        const lang = match ? match[1] : '';
                        return (
                            <div key={idx} className="relative group my-3 border border-[#30363d] rounded-lg overflow-hidden">
                                <div className="bg-[#161b22] px-3 py-1.5 flex justify-between items-center text-xs text-[#858585] border-b border-[#30363d]">
                                    <span>{lang}</span>
                                    <button onClick={() => replaceEditorCode(code)} className="flex items-center gap-1 hover:text-emerald-400 transition-colors">

            );
        };

        // Global Error Boundary to prevent complete DOM Unmounting (Black screens) 
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("REACT CRASH ERROR:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return <div className="p-8 text-red-400 font-mono bg-[#1e1e1e] h-screen w-screen overflow-auto">
                        <h1 className="text-2xl font-bold mb-4">React Framework Exception Dastur quladi!</h1>
                        <p className="mb-4">Nimadir funksiya noto'g'ri ishlab, interfeysni buzib qo'ydi. "Fayllarni ajratish" vaqtida shunday xolat uchrashi mumkin.</p>
                        <pre className="p-4 bg-black/50 rounded mb-4 overflow-x-auto text-sm">{this.state.error.stack || this.state.error.message}</pre>
                        <button onClick={() => window.location.reload()} className="px-5 py-2 bg-[#007acc] text-white hover:bg-[#005f9e] rounded transition">Sahifani yangilash joriy holatga qaytish</button>
                    </div>;
                }
                return this.props.children; 
            }
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<ErrorBoundary><App /></ErrorBoundary>);
        } catch (error) {
            document.getElementById('root').innerHTML = `<div style="color:red; padding:20px; font-family:monospace;"><b>CRITICAL BOOT ERROR:</b><br/>${error.stack || error.message}</div>`;
            console.error(error);
        }
    </script>
</body>
</html>
